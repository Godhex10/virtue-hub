<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Virtue's Planner 🤎</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --brown-deep:#3E1F00;--brown-rich:#6B3A1F;--brown-warm:#A0522D;
      --brown-mid:#C4845A;--brown-light:#E8C4A2;--brown-blush:#F5E6D8;
      --cream:#FDF6EE;--gold:#C9943A;--gold-light:#F0D080;
      --text-dark:#2A1200;--text-mid:#6B4226;--text-soft:#9B6B4A;
      --c-work:#A0522D;--c-work-bg:#F5E6D8;
      --c-personal:#7B6CB5;--c-personal-bg:#EFEBF9;
      --c-self:#2D8A6E;--c-self-bg:#E6F5EF;
      --c-errand:#C9943A;--c-errand-bg:#FBF1DD;
      --c-social:#C5577B;--c-social-bg:#FBE9EF;
    }
    body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--text-dark);min-height:100vh;padding-bottom:40px}

    .header{background:linear-gradient(135deg,var(--brown-deep),var(--brown-rich));padding:28px 24px 20px}
    .back-link{display:inline-flex;align-items:center;gap:6px;color:var(--brown-light);text-decoration:none;font-size:12px;font-weight:500;margin-bottom:16px}
    .back-link:hover{color:#fff}
    .header-inner{max-width:760px;margin:0 auto}
    .header-title{font-family:'Playfair Display',serif;font-size:clamp(24px,5vw,32px);font-weight:700;color:#fff}
    .header-sub{font-size:12px;color:var(--brown-light);margin-top:2px;margin-bottom:18px}

    .view-toggle{display:flex;background:rgba(255,255,255,0.1);border-radius:99px;padding:4px;width:fit-content}
    .view-opt{padding:8px 20px;border-radius:99px;font-size:13px;font-weight:600;color:var(--brown-light);cursor:pointer;transition:all 0.2s}
    .view-opt.active{background:#fff;color:var(--brown-deep)}

    /* ── DAILY VIEW ── */
    .daily-wrap{max-width:760px;margin:0 auto;padding:24px}
    .day-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    .day-nav-btn{background:#fff;border:1.5px solid var(--brown-light);border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:16px;color:var(--brown-warm);display:flex;align-items:center;justify-content:center}
    .day-nav-label{text-align:center}
    .day-nav-label .day-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--brown-deep)}
    .day-nav-label .day-date{font-size:12px;color:var(--text-soft)}
    .today-pill{display:inline-block;font-size:10px;background:var(--gold-light);color:var(--brown-deep);padding:2px 8px;border-radius:99px;margin-top:4px;font-weight:600}

    .add-event-btn{
      width:100%;background:#fff;border:1.5px dashed var(--brown-light);border-radius:14px;
      padding:14px;font-size:13.5px;color:var(--brown-warm);font-weight:600;cursor:pointer;
      margin-bottom:18px;transition:all 0.2s;font-family:'DM Sans',sans-serif;
    }
    .add-event-btn:hover{border-color:var(--brown-warm);background:var(--brown-blush)}

    .timeline{position:relative}
    .time-slot{display:flex;gap:14px;min-height:64px;border-top:1px solid var(--brown-blush)}
    .time-slot:first-child{border-top:none}
    .time-label{width:62px;flex-shrink:0;padding-top:8px;font-size:11px;color:var(--text-soft);font-weight:500;text-align:right}
    .time-events{flex:1;padding:6px 0;display:flex;flex-direction:column;gap:6px}

    .event-card{
      border-radius:12px;padding:10px 14px;cursor:pointer;
      border-left:4px solid;transition:transform 0.15s;
    }
    .event-card:hover{transform:translateX(2px)}
    .event-title{font-size:13.5px;font-weight:600;color:var(--text-dark)}
    .event-time{font-size:11px;color:var(--text-soft);margin-top:1px}

    .empty-day{text-align:center;padding:50px 20px;color:var(--text-soft)}
    .empty-day .emoji{font-size:36px;margin-bottom:10px}
    .empty-day p{font-size:13px}

    /* ── WEEKLY VIEW ── */
    .weekly-wrap{max-width:1000px;margin:0 auto;padding:24px;overflow-x:auto}
    .week-grid{display:grid;grid-template-columns:repeat(7,minmax(130px,1fr));gap:10px;min-width:900px}
    .week-day-col{background:#fff;border:1px solid var(--brown-light);border-radius:14px;padding:12px;min-height:200px}
    .week-day-col.is-today{border-color:var(--brown-warm);background:var(--brown-blush)}
    .week-day-header{text-align:center;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--brown-blush)}
    .week-day-name{font-size:11px;color:var(--text-soft);font-weight:600;letter-spacing:0.5px}
    .week-day-num{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--brown-deep)}
    .week-event{
      background:var(--brown-blush);border-left:3px solid var(--brown-warm);
      border-radius:8px;padding:6px 8px;margin-bottom:6px;cursor:pointer;
    }
    .week-event-title{font-size:11.5px;font-weight:600;color:var(--text-dark);line-height:1.3}
    .week-event-time{font-size:10px;color:var(--text-soft);margin-top:1px}
    .week-add-btn{
      width:100%;background:none;border:1px dashed var(--brown-light);border-radius:8px;
      padding:8px;font-size:11px;color:var(--brown-warm);cursor:pointer;margin-top:4px;
      font-family:'DM Sans',sans-serif;
    }

    /* ── LEGEND ── */
    .legend{max-width:760px;margin:0 auto;padding:0 24px;display:flex;gap:14px;flex-wrap:wrap}
    .legend-item{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text-mid)}
    .legend-dot{width:9px;height:9px;border-radius:50%}

    /* ── PANEL ── */
    .overlay{display:none;position:fixed;inset:0;background:rgba(62,31,0,0.45);z-index:100;backdrop-filter:blur(2px)}
    .overlay.show{display:block}
    .panel{
      position:fixed;left:0;right:0;bottom:0;background:var(--cream);
      border-radius:24px 24px 0 0;max-width:700px;margin:0 auto;
      padding:24px 24px 28px;z-index:101;transform:translateY(100%);
      transition:transform 0.3s cubic-bezier(.25,.8,.25,1);max-height:88vh;overflow-y:auto;
    }
    .panel.show{transform:translateY(0)}
    .panel-handle{width:40px;height:4px;background:var(--brown-light);border-radius:99px;margin:0 auto 18px}
    .panel-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--brown-deep);margin-bottom:18px}
    .field-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-soft);font-weight:600;margin-bottom:7px;display:block}
    .field{margin-bottom:16px}
    .field input[type="text"],.field input[type="date"],.field input[type="time"]{
      width:100%;border:1.5px solid var(--brown-light);border-radius:12px;padding:12px 14px;
      font-family:'DM Sans',sans-serif;font-size:14px;background:#fff;outline:none;color:var(--text-dark);
    }
    .field input:focus{border-color:var(--brown-warm)}
    .field-row{display:flex;gap:12px}
    .field-row .field{flex:1}

    .color-grid{display:flex;gap:10px;flex-wrap:wrap}
    .color-opt{
      flex:1;min-width:90px;text-align:center;padding:10px 8px;border-radius:12px;
      border:2px solid transparent;cursor:pointer;font-size:12px;font-weight:600;transition:all 0.2s;
    }
    .color-opt.selected{border-color:var(--brown-deep)}

    .panel-btns{display:flex;gap:10px;margin-top:6px}
    .save-btn{flex:1;background:linear-gradient(135deg,var(--brown-rich),var(--brown-warm));color:#fff;border:none;border-radius:14px;padding:15px;font-size:14.5px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
    .cancel-btn{background:#fff;border:1.5px solid var(--brown-light);color:var(--text-mid);border-radius:14px;padding:15px 22px;font-size:14.5px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
    .delete-link{text-align:center;margin-top:14px;font-size:12.5px;color:#9B2020;cursor:pointer;font-weight:500}

    @media(max-width:480px){
      .header{padding:22px 16px 18px}
      .daily-wrap{padding:18px 16px}
      .legend{padding:0 16px}
      .panel{padding:22px 18px 24px}
      .time-label{width:46px;font-size:10px}
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="../" class="back-link">← Back to Hub</a>
    <div class="header-inner">
      <div class="header-title">Virtue's Planner <i class="fa-solid fa-calendar-days"></i></div>
      <div class="header-sub">Your days, your way.</div>
      <div class="view-toggle">
        <div class="view-opt active" data-view="daily">Daily</div>
        <div class="view-opt" data-view="weekly">Weekly</div>
      </div>
    </div>
  </div>

  <div class="legend" id="legend"></div>

  <!-- DAILY VIEW -->
  <div class="daily-wrap" id="view-daily">
    <div class="day-nav">
      <button class="day-nav-btn" id="prev-day">←</button>
      <div class="day-nav-label">
        <div class="day-name" id="day-name">Monday</div>
        <div class="day-date" id="day-date">1 January</div>
        <div class="today-pill" id="today-pill" style="display:none">Today</div>
      </div>
      <button class="day-nav-btn" id="next-day">→</button>
    </div>
    <button class="add-event-btn" id="add-event-btn">+ Add Event</button>
    <div class="timeline" id="timeline"></div>
  </div>

  <!-- WEEKLY VIEW -->
  <div class="weekly-wrap" id="view-weekly" style="display:none">
    <div class="week-grid" id="week-grid"></div>
  </div>

  <!-- PANEL -->
  <div class="overlay" id="overlay"></div>
  <div class="panel" id="panel">
    <div class="panel-handle"></div>
    <div class="panel-title" id="panel-title">New Event</div>

    <div class="field">
      <label class="field-label">Event</label>
      <input type="text" id="f-title" placeholder="What's happening?"/>
    </div>

    <div class="field-row">
      <div class="field">
        <label class="field-label">Date</label>
        <input type="date" id="f-date"/>
      </div>
      <div class="field">
        <label class="field-label">Time</label>
        <input type="time" id="f-time"/>
      </div>
    </div>

    <div class="field">
      <label class="field-label">Category</label>
      <div class="color-grid" id="color-grid"></div>
    </div>

    <div class="panel-btns">
      <button class="cancel-btn" id="cancel-btn">Cancel</button>
      <button class="save-btn" id="save-btn">Save Event</button>
    </div>
    <div class="delete-link" id="delete-link" style="display:none">Delete this event</div>
  </div>

<script>
const STORAGE_KEY='virtue_planner_v1';
const CATEGORIES=[
  {id:'work',label:'Work',color:'var(--c-work)',bg:'var(--c-work-bg)'},
  {id:'personal',label:'Personal',color:'var(--c-personal)',bg:'var(--c-personal-bg)'},
  {id:'self',label:'Self-care',color:'var(--c-self)',bg:'var(--c-self-bg)'},
  {id:'errand',label:'Errand',color:'var(--c-errand)',bg:'var(--c-errand-bg)'},
  {id:'social',label:'Social',color:'var(--c-social)',bg:'var(--c-social-bg)'},
];

let events=[];
let currentView='daily';
let currentDate=new Date();
let editingId=null;
let selectedCategory='work';

function loadEvents(){try{events=JSON.parse(localStorage.getItem(STORAGE_KEY))||[]}catch{events=[]}}
function saveEvents(){localStorage.setItem(STORAGE_KEY,JSON.stringify(events))}
function uid(){return 'e_'+Date.now()+'_'+Math.floor(Math.random()*10000)}
function dateStr(d){return d.toISOString().split('T')[0]}
function todayStr(){return dateStr(new Date())}
function catInfo(id){return CATEGORIES.find(c=>c.id===id)||CATEGORIES[0]}

function renderLegend(){
  document.getElementById('legend').innerHTML=CATEGORIES.map(c=>`
    <div class="legend-item"><span class="legend-dot" style="background:${c.color}"></span>${c.label}</div>
  `).join('');
}

/* ── DAILY VIEW ── */
const HOURS=Array.from({length:17},(_,i)=>i+6); // 6am - 10pm

function renderDaily(){
  const ds=dateStr(currentDate);
  document.getElementById('day-name').textContent=currentDate.toLocaleDateString('en-GB',{weekday:'long'});
  document.getElementById('day-date').textContent=currentDate.toLocaleDateString('en-GB',{day:'numeric',month:'long'});
  document.getElementById('today-pill').style.display = ds===todayStr() ? 'inline-block' : 'none';

  const dayEvents=events.filter(e=>e.date===ds).sort((a,b)=>(a.time||'00:00')<(b.time||'00:00')?-1:1);

  const timeline=document.getElementById('timeline');
  if(dayEvents.length===0){
    timeline.innerHTML=`<div class="empty-day"><div class="emoji">🌿</div><p>Nothing planned yet. Tap "+ Add Event" to start filling your day.</p></div>`;
    return;
  }

  timeline.innerHTML = HOURS.map(h=>{
    const hStr=String(h).padStart(2,'0')+':00';
    const label=h<12?`${h===0?12:h} AM`:`${h===12?12:h-12} PM`;
    const slotEvents=dayEvents.filter(e=>{
      if(!e.time)return h===6; // no-time events show at top slot
      const eh=parseInt(e.time.split(':')[0]);
      return eh===h;
    });
    return `
      <div class="time-slot">
        <div class="time-label">${label}</div>
        <div class="time-events">
          ${slotEvents.map(eventCardHTML).join('')}
        </div>
      </div>`;
  }).join('');

  attachEventClicks();
}

function eventCardHTML(e){
  const c=catInfo(e.category);
  return `<div class="event-card" style="background:${c.bg};border-left-color:${c.color}" data-id="${e.id}">
    <div class="event-title">${escapeHtml(e.title)}</div>
    ${e.time?`<div class="event-time">${formatTime(e.time)}</div>`:''}
  </div>`;
}

function formatTime(t){
  const[h,m]=t.split(':');const hh=parseInt(h);
  const period=hh>=12?'PM':'AM';const h12=hh%12===0?12:hh%12;
  return `${h12}:${m} ${period}`;
}
function escapeHtml(str){const d=document.createElement('div');d.textContent=str;return d.innerHTML}

function attachEventClicks(){
  document.querySelectorAll('.event-card').forEach(el=>{
    el.addEventListener('click',()=>openPanel(el.dataset.id));
  });
  document.querySelectorAll('.week-event').forEach(el=>{
    el.addEventListener('click',()=>openPanel(el.dataset.id));
  });
}

document.getElementById('prev-day').addEventListener('click',()=>{
  currentDate.setDate(currentDate.getDate()-1);renderDaily();
});
document.getElementById('next-day').addEventListener('click',()=>{
  currentDate.setDate(currentDate.getDate()+1);renderDaily();
});

/* ── WEEKLY VIEW ── */
function getWeekStart(d){
  const date=new Date(d);
  const day=date.getDay();
  const diff=date.getDate()-day+(day===0?-6:1); // Monday start
  return new Date(date.setDate(diff));
}

function renderWeekly(){
  const weekStart=getWeekStart(currentDate);
  const grid=document.getElementById('week-grid');
  let html='';
  for(let i=0;i<7;i++){
    const d=new Date(weekStart);
    d.setDate(weekStart.getDate()+i);
    const ds=dateStr(d);
    const isToday=ds===todayStr();
    const dayEvents=events.filter(e=>e.date===ds).sort((a,b)=>(a.time||'00:00')<(b.time||'00:00')?-1:1);

    html+=`
      <div class="week-day-col ${isToday?'is-today':''}">
        <div class="week-day-header">
          <div class="week-day-name">${d.toLocaleDateString('en-GB',{weekday:'short'})}</div>
          <div class="week-day-num">${d.getDate()}</div>
        </div>
        ${dayEvents.map(e=>{
          const c=catInfo(e.category);
          return `<div class="week-event" style="background:${c.bg};border-left-color:${c.color}" data-id="${e.id}">
            <div class="week-event-title">${escapeHtml(e.title)}</div>
            ${e.time?`<div class="week-event-time">${formatTime(e.time)}</div>`:''}
          </div>`;
        }).join('')}
        <button class="week-add-btn" data-date="${ds}">+ Add</button>
      </div>`;
  }
  grid.innerHTML=html;
  attachEventClicks();
  document.querySelectorAll('.week-add-btn').forEach(el=>{
    el.addEventListener('click',()=>openPanel(null,el.dataset.date));
  });
}

/* ── VIEW TOGGLE ── */
document.querySelectorAll('.view-opt').forEach(el=>{
  el.addEventListener('click',()=>{
    document.querySelectorAll('.view-opt').forEach(o=>o.classList.remove('active'));
    el.classList.add('active');
    currentView=el.dataset.view;
    document.getElementById('view-daily').style.display=currentView==='daily'?'block':'none';
    document.getElementById('view-weekly').style.display=currentView==='weekly'?'block':'none';
    renderAll();
  });
});

/* ── PANEL ── */
function renderColorGrid(){
  document.getElementById('color-grid').innerHTML=CATEGORIES.map(c=>`
    <div class="color-opt ${c.id===selectedCategory?'selected':''}" data-cat="${c.id}"
      style="background:${c.bg};color:${c.color}">${c.label}</div>
  `).join('');
  document.querySelectorAll('.color-opt').forEach(el=>{
    el.addEventListener('click',()=>{
      selectedCategory=el.dataset.cat;
      renderColorGrid();
    });
  });
}

function openPanel(id=null,presetDate=null){
  editingId=id;
  const overlay=document.getElementById('overlay');
  const panel=document.getElementById('panel');

  if(id){
    const e=events.find(x=>x.id===id);
    document.getElementById('panel-title').textContent='Edit Event';
    document.getElementById('f-title').value=e.title;
    document.getElementById('f-date').value=e.date;
    document.getElementById('f-time').value=e.time||'';
    selectedCategory=e.category;
    document.getElementById('delete-link').style.display='block';
  }else{
    document.getElementById('panel-title').textContent='New Event';
    document.getElementById('f-title').value='';
    document.getElementById('f-date').value=presetDate || dateStr(currentDate);
    document.getElementById('f-time').value='';
    selectedCategory='work';
    document.getElementById('delete-link').style.display='none';
  }
  renderColorGrid();
  overlay.classList.add('show');
  panel.classList.add('show');
  setTimeout(()=>document.getElementById('f-title').focus(),300);
}

function closePanel(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('panel').classList.remove('show');
  editingId=null;
}

document.getElementById('add-event-btn').addEventListener('click',()=>openPanel());
document.getElementById('cancel-btn').addEventListener('click',closePanel);
document.getElementById('overlay').addEventListener('click',closePanel);

document.getElementById('save-btn').addEventListener('click',()=>{
  const title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').focus();return}
  const date=document.getElementById('f-date').value || dateStr(currentDate);
  const time=document.getElementById('f-time').value;

  if(editingId){
    const e=events.find(x=>x.id===editingId);
    e.title=title;e.date=date;e.time=time;e.category=selectedCategory;
  }else{
    events.push({id:uid(),title,date,time,category:selectedCategory});
  }
  saveEvents();
  closePanel();
  renderAll();
});

document.getElementById('delete-link').addEventListener('click',()=>{
  events=events.filter(x=>x.id!==editingId);
  saveEvents();
  closePanel();
  renderAll();
});

function renderAll(){
  if(currentView==='daily')renderDaily();
  else renderWeekly();
}

/* ── INIT ── */
loadEvents();
renderLegend();
renderAll();
</script>
</body>
</html>
