<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Virtue's Journal 🤎</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --brown-deep:#3E1F00;--brown-rich:#6B3A1F;--brown-warm:#A0522D;
      --brown-mid:#C4845A;--brown-light:#E8C4A2;--brown-blush:#F5E6D8;
      --cream:#FDF6EE;--gold:#C9943A;--gold-light:#F0D080;
      --text-dark:#2A1200;--text-mid:#6B4226;--text-soft:#9B6B4A;
    }

    body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--text-dark);min-height:100vh;padding-bottom:60px}

    /* ── HEADER ── */
    .header{background:linear-gradient(135deg,var(--brown-deep),var(--brown-rich));padding:28px 24px 24px}
    .back-link{display:inline-flex;align-items:center;gap:6px;color:var(--brown-light);text-decoration:none;font-size:12px;font-weight:500;margin-bottom:16px;transition:color 0.2s}
    .back-link:hover{color:#fff}
    .header-inner{max-width:700px;margin:0 auto}
    .header-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px}
    .header-title{font-family:'Playfair Display',serif;font-size:clamp(24px,5vw,32px);font-weight:700;color:#fff}
    .header-sub{font-size:12px;color:var(--brown-light);margin-top:2px}
    .new-btn{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--brown-deep);border:none;border-radius:99px;padding:12px 22px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(201,148,58,0.3);transition:transform 0.2s;white-space:nowrap}
    .new-btn:hover{transform:translateY(-2px)}

    /* search */
    .search-wrap{position:relative}
    .search-input{
      width:100%;background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.2);
      border-radius:12px;padding:11px 16px 11px 40px;
      font-family:'DM Sans',sans-serif;font-size:13.5px;color:#fff;outline:none;
      transition:background 0.2s;
    }
    .search-input::placeholder{color:rgba(255,255,255,0.45)}
    .search-input:focus{background:rgba(255,255,255,0.18)}
    .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;opacity:0.6}

    /* ── MOOD FILTER ── */
    .mood-filter{max-width:700px;margin:20px auto 0;padding:0 24px;display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
    .mood-pill{flex-shrink:0;background:#fff;border:1.5px solid var(--brown-light);border-radius:99px;padding:7px 14px;font-size:12.5px;font-weight:500;color:var(--text-mid);cursor:pointer;transition:all 0.2s;white-space:nowrap}
    .mood-pill.active{background:var(--brown-warm);border-color:var(--brown-warm);color:#fff}

    /* ── ENTRIES GRID ── */
    .entries-wrap{max-width:700px;margin:0 auto;padding:20px 24px 0}
    .entries-count{font-size:12px;color:var(--text-soft);margin-bottom:16px;font-weight:500}

    .entry-card{
      background:#fff;border:1px solid var(--brown-light);border-radius:18px;
      padding:22px 22px 18px;margin-bottom:14px;cursor:pointer;
      transition:box-shadow 0.2s,transform 0.2s;
    }
    .entry-card:hover{box-shadow:0 8px 24px rgba(107,58,31,0.12);transform:translateY(-2px)}
    .entry-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
    .entry-mood{font-size:22px;flex-shrink:0;margin-top:2px}
    .entry-meta{flex:1;min-width:0}
    .entry-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--brown-deep);line-height:1.3;margin-bottom:3px}
    .entry-date{font-size:11px;color:var(--text-soft);font-weight:500}
    .entry-preview{font-size:13px;color:var(--text-mid);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .entry-actions{display:flex;gap:6px;flex-shrink:0}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:15px;color:var(--text-soft);padding:4px;transition:color 0.2s}
    .icon-btn:hover{color:var(--brown-warm)}
    .icon-btn.delete:hover{color:#9B2020}

    /* empty */
    .empty-state{text-align:center;padding:60px 24px;color:var(--text-soft)}
    .empty-state .emoji{font-size:44px;margin-bottom:14px}
    .empty-state h3{font-family:'Playfair Display',serif;color:var(--brown-deep);font-size:18px;margin-bottom:6px}
    .empty-state p{font-size:13px;max-width:280px;margin:0 auto;line-height:1.6}

    /* loading */
    .loading{text-align:center;padding:60px 24px;color:var(--text-soft);font-size:13px}
    .spinner{width:28px;height:28px;border:3px solid var(--brown-light);border-top-color:var(--brown-warm);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── WRITE SCREEN ── */
    .write-screen{
      display:none;position:fixed;inset:0;background:var(--cream);z-index:200;
      flex-direction:column;overflow:hidden;
    }
    .write-screen.show{display:flex}

    .write-header{
      background:linear-gradient(135deg,var(--brown-deep),var(--brown-rich));
      padding:20px 24px;display:flex;align-items:center;gap:14px;flex-shrink:0;
    }
    .write-back-btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:99px;padding:8px 16px;font-size:12.5px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;white-space:nowrap}
    .write-header-center{flex:1;text-align:center}
    .write-header-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--brown-light);font-weight:500}
    .write-save-btn{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--brown-deep);border:none;border-radius:99px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
    .write-save-btn:disabled{opacity:0.45;cursor:not-allowed}

    .write-body{flex:1;overflow-y:auto;padding:28px 24px;max-width:700px;margin:0 auto;width:100%}

    .title-input{
      width:100%;border:none;background:transparent;outline:none;
      font-family:'Playfair Display',serif;font-size:clamp(22px,5vw,30px);
      font-weight:700;color:var(--brown-deep);margin-bottom:6px;
      resize:none;overflow:hidden;line-height:1.3;
    }
    .title-input::placeholder{color:var(--brown-light)}

    .write-divider{height:1px;background:var(--brown-blush);margin:14px 0}

    .mood-selector{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
    .mood-opt{
      font-size:22px;cursor:pointer;border-radius:12px;padding:8px 12px;
      border:2px solid transparent;transition:all 0.2s;background:#fff;
    }
    .mood-opt.selected{border-color:var(--brown-warm);background:var(--brown-blush)}
    .mood-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-soft);font-weight:600;margin-bottom:10px}

    .body-input{
      width:100%;border:none;background:transparent;outline:none;
      font-family:'DM Sans',sans-serif;font-size:15px;
      color:var(--text-dark);line-height:1.85;resize:none;
      min-height:300px;
    }
    .body-input::placeholder{color:var(--brown-light)}

    .write-footer{
      padding:14px 24px;border-top:1px solid var(--brown-blush);
      display:flex;justify-content:space-between;align-items:center;
      font-size:12px;color:var(--text-soft);flex-shrink:0;
      background:var(--cream);
    }
    .word-count{font-weight:500}
    .save-status{display:flex;align-items:center;gap:6px}
    .status-dot{width:7px;height:7px;border-radius:50%;background:var(--brown-light)}
    .status-dot.saving{background:var(--gold);animation:pulse 1s infinite}
    .status-dot.saved{background:#2D6A4F}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

    /* toast */
    .toast{
      position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);
      background:var(--brown-deep);color:#fff;border-radius:99px;
      padding:12px 24px;font-size:13px;font-weight:500;
      opacity:0;transition:all 0.3s;z-index:999;white-space:nowrap;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    @media(max-width:480px){
      .header{padding:22px 16px 20px}
      .entries-wrap{padding:16px 16px 0}
      .write-body{padding:22px 18px}
    }
  </style>
</head>
<body>

  <!-- ── LIST VIEW ── -->
  <div class="header">
    <a href="../" class="back-link">← Back to Hub</a>
    <div class="header-inner">
      <div class="header-top">
        <div>
          <div class="header-title">Virtue's Journal <i class="fa-solid fa-book-open"></i></div>
          <div class="header-sub">Your thoughts, always safe here.</div>
        </div>
        <button class="new-btn" id="new-entry-btn">+ New Entry</button>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="search-input" type="text" placeholder="Search your entries…"/>
      </div>
    </div>
  </div>

  <div class="mood-filter" id="mood-filter">
    <div class="mood-pill active" data-mood="all">All</div>
    <div class="mood-pill" data-mood="😊">😊 Happy</div>
    <div class="mood-pill" data-mood="😌">😌 Calm</div>
    <div class="mood-pill" data-mood="😔">😔 Sad</div>
    <div class="mood-pill" data-mood="😤">😤 Frustrated</div>
    <div class="mood-pill" data-mood="🥰">🥰 Loved</div>
    <div class="mood-pill" data-mood="😰">😰 Anxious</div>
    <div class="mood-pill" data-mood="🔥">🔥 Motivated</div>
    <div class="mood-pill" data-mood="😴">😴 Tired</div>
  </div>

  <div class="entries-wrap">
    <div class="entries-count" id="entries-count"></div>
    <div id="entries-list"><div class="loading"><div class="spinner"></div>Loading your journal…</div></div>
  </div>

  <!-- ── WRITE SCREEN ── -->
  <div class="write-screen" id="write-screen">
    <div class="write-header">
      <button class="write-back-btn" id="write-back-btn">← Back</button>
      <div class="write-header-center">
        <div class="write-header-label" id="write-date-label"></div>
      </div>
      <button class="write-save-btn" id="write-save-btn">Save</button>
    </div>
    <div class="write-body">
      <textarea class="title-input" id="w-title" placeholder="Give this entry a title…" rows="1"></textarea>
      <div class="write-divider"></div>
      <div class="mood-label">How are you feeling?</div>
      <div class="mood-selector" id="mood-selector">
        <div class="mood-opt" data-mood="😊" title="Happy">😊</div>
        <div class="mood-opt" data-mood="😌" title="Calm">😌</div>
        <div class="mood-opt" data-mood="😔" title="Sad">😔</div>
        <div class="mood-opt" data-mood="😤" title="Frustrated">😤</div>
        <div class="mood-opt" data-mood="🥰" title="Loved">🥰</div>
        <div class="mood-opt" data-mood="😰" title="Anxious">😰</div>
        <div class="mood-opt" data-mood="🔥" title="Motivated">🔥</div>
        <div class="mood-opt" data-mood="😴" title="Tired">😴</div>
      </div>
      <div class="write-divider"></div>
      <textarea class="body-input" id="w-body" placeholder="Write freely… this is your space. No one else can see this. 🤎"></textarea>
    </div>
    <div class="write-footer">
      <div class="word-count" id="word-count">0 words</div>
      <div class="save-status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Ready</span>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://xkrddzphzgfxrednxvsb.supabase.co';
const SUPABASE_KEY='sb_publishable_rTuJfAPMkdzIVefPuMnaqA_Y-bagxcI';
const HEADERS={'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};

let entries=[];
let editingId=null;
let selectedMood=null;
let filterMood='all';
let searchQuery='';

/* ── SUPABASE API ── */
async function fetchEntries(){
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/journal_entries?order=created_at.desc`,{headers:{...HEADERS,'Prefer':'return=representation'}});
    if(!res.ok)throw new Error();
    entries=await res.json();
  }catch{
    showToast('Could not load entries. Check your connection.');
    entries=[];
  }
}

async function saveEntry(entry){
  if(entry.id){
    // update
    const res=await fetch(`${SUPABASE_URL}/rest/v1/journal_entries?id=eq.${entry.id}`,{
      method:'PATCH',
      headers:{...HEADERS,'Prefer':'return=representation'},
      body:JSON.stringify({title:entry.title,body:entry.body,mood:entry.mood,updated_at:new Date().toISOString()})
    });
    if(!res.ok)throw new Error();
    const updated=await res.json();
    const idx=entries.findIndex(e=>e.id===entry.id);
    if(idx>-1)entries[idx]=updated[0];
  }else{
    // insert
    const res=await fetch(`${SUPABASE_URL}/rest/v1/journal_entries`,{
      method:'POST',
      headers:{...HEADERS,'Prefer':'return=representation'},
      body:JSON.stringify({title:entry.title,body:entry.body,mood:entry.mood})
    });
    if(!res.ok)throw new Error();
    const created=await res.json();
    entries.unshift(created[0]);
    return created[0];
  }
}

async function deleteEntry(id){
  await fetch(`${SUPABASE_URL}/rest/v1/journal_entries?id=eq.${id}`,{
    method:'DELETE',headers:HEADERS
  });
  entries=entries.filter(e=>e.id!==id);
}

/* ── RENDER LIST ── */
function filteredEntries(){
  let list=entries;
  if(filterMood!=='all')list=list.filter(e=>e.mood===filterMood);
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    list=list.filter(e=>(e.title||'').toLowerCase().includes(q)||(e.body||'').toLowerCase().includes(q));
  }
  return list;
}

function renderList(){
  const list=filteredEntries();
  const container=document.getElementById('entries-list');
  const countEl=document.getElementById('entries-count');

  countEl.textContent=`${list.length} ${list.length===1?'entry':'entries'}`;

  if(list.length===0){
    container.innerHTML=`
      <div class="empty-state">
        <div class="emoji">📖</div>
        <h3>${entries.length===0?'Your journal is empty':'Nothing found'}</h3>
        <p>${entries.length===0?'Tap "+ New Entry" to write your first entry. This space is entirely yours.':'Try a different search or mood filter.'}</p>
      </div>`;
    return;
  }

  container.innerHTML=list.map(e=>`
    <div class="entry-card" data-id="${e.id}">
      <div class="entry-top">
        <div class="entry-mood">${e.mood||'📖'}</div>
        <div class="entry-meta">
          <div class="entry-title">${escapeHtml(e.title||'Untitled Entry')}</div>
          <div class="entry-date">${formatDate(e.created_at)}</div>
        </div>
        <div class="entry-actions">
          <button class="icon-btn delete" data-id="${e.id}" title="Delete">✕</button>
        </div>
      </div>
      <div class="entry-preview">${escapeHtml(e.body||'')}</div>
    </div>
  `).join('');

  // click card to edit
  container.querySelectorAll('.entry-card').forEach(el=>{
    el.addEventListener('click',e=>{
      if(e.target.closest('.icon-btn'))return;
      openWrite(el.dataset.id);
    });
  });

  // delete
  container.querySelectorAll('.icon-btn.delete').forEach(el=>{
    el.addEventListener('click',async e=>{
      e.stopPropagation();
      if(!confirm('Delete this entry? This cannot be undone.'))return;
      await deleteEntry(el.dataset.id);
      renderList();
      showToast('Entry deleted.');
    });
  });
}

function formatDate(iso){
  const d=new Date(iso);
  return d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+' · '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}
function escapeHtml(str){const d=document.createElement('div');d.textContent=str;return d.innerHTML}

/* ── WRITE SCREEN ── */
function openWrite(id=null){
  editingId=id;
  const screen=document.getElementById('write-screen');
  screen.classList.add('show');

  if(id){
    const e=entries.find(x=>x.id===id);
    document.getElementById('w-title').value=e.title||'';
    document.getElementById('w-body').value=e.body||'';
    selectedMood=e.mood||null;
    document.getElementById('write-date-label').textContent=formatDate(e.created_at);
  }else{
    document.getElementById('w-title').value='';
    document.getElementById('w-body').value='';
    selectedMood=null;
    document.getElementById('write-date-label').textContent=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  }

  updateMoodSelector();
  updateWordCount();
  setStatus('ready');
  autoResizeTitle();
  setTimeout(()=>document.getElementById(editingId?'w-body':'w-title').focus(),300);
}

function closeWrite(){
  document.getElementById('write-screen').classList.remove('show');
  editingId=null;
}

function updateMoodSelector(){
  document.querySelectorAll('.mood-opt').forEach(el=>{
    el.classList.toggle('selected',el.dataset.mood===selectedMood);
  });
}

document.querySelectorAll('.mood-opt').forEach(el=>{
  el.addEventListener('click',()=>{
    selectedMood=selectedMood===el.dataset.mood?null:el.dataset.mood;
    updateMoodSelector();
  });
});

function updateWordCount(){
  const words=document.getElementById('w-body').value.trim().split(/\s+/).filter(Boolean).length;
  document.getElementById('word-count').textContent=`${words} ${words===1?'word':'words'}`;
}
document.getElementById('w-body').addEventListener('input',updateWordCount);

function autoResizeTitle(){
  const el=document.getElementById('w-title');
  el.style.height='auto';el.style.height=el.scrollHeight+'px';
}
document.getElementById('w-title').addEventListener('input',autoResizeTitle);

function setStatus(state){
  const dot=document.getElementById('status-dot');
  const text=document.getElementById('status-text');
  dot.className='status-dot';
  if(state==='saving'){dot.classList.add('saving');text.textContent='Saving…'}
  else if(state==='saved'){dot.classList.add('saved');text.textContent='Saved ✓'}
  else{text.textContent='Ready'}
}

document.getElementById('write-save-btn').addEventListener('click',async()=>{
  const title=document.getElementById('w-title').value.trim();
  const body=document.getElementById('w-body').value.trim();
  if(!body){document.getElementById('w-body').focus();return}

  setStatus('saving');
  document.getElementById('write-save-btn').disabled=true;

  try{
    await saveEntry({id:editingId,title,body,mood:selectedMood});
    setStatus('saved');
    showToast(editingId?'Entry updated 🤎':'Entry saved 🤎');
    setTimeout(()=>{
      closeWrite();
      renderList();
    },600);
  }catch{
    setStatus('ready');
    showToast('Could not save. Check your connection.');
  }finally{
    document.getElementById('write-save-btn').disabled=false;
  }
});

document.getElementById('write-back-btn').addEventListener('click',()=>{
  const body=document.getElementById('w-body').value.trim();
  if(body){
    if(!confirm('Go back without saving?'))return;
  }
  closeWrite();
});

/* ── FILTERS & SEARCH ── */
document.getElementById('new-entry-btn').addEventListener('click',()=>openWrite());

document.getElementById('search-input').addEventListener('input',e=>{
  searchQuery=e.target.value;
  renderList();
});

document.querySelectorAll('.mood-pill').forEach(el=>{
  el.addEventListener('click',()=>{
    document.querySelectorAll('.mood-pill').forEach(p=>p.classList.remove('active'));
    el.classList.add('active');
    filterMood=el.dataset.mood;
    renderList();
  });
});

/* ── TOAST ── */
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

/* ── INIT ── */
(async()=>{
  await fetchEntries();
  renderList();
})();
</script>
</body>
</html>
