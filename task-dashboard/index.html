<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Virtue's Tasks 🤎</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --brown-deep:#3E1F00;
      --brown-rich:#6B3A1F;
      --brown-warm:#A0522D;
      --brown-mid:#C4845A;
      --brown-light:#E8C4A2;
      --brown-blush:#F5E6D8;
      --cream:#FDF6EE;
      --gold:#C9943A;
      --gold-light:#F0D080;
      --green:#2D6A4F;--green-bg:#EDFAF4;--green-border:#B2E5CC;
      --amber:#8B5E00;--amber-bg:#FFF4E0;--amber-border:#F0D080;
      --red:#9B2020;--red-bg:#FDECEA;--red-border:#F5C6C6;
      --text-dark:#2A1200;--text-mid:#6B4226;--text-soft:#9B6B4A;
    }

    body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--text-dark);min-height:100vh;padding-bottom:40px}

    /* ── HEADER ── */
    .header{
      background:linear-gradient(135deg,var(--brown-deep),var(--brown-rich));
      padding:28px 24px 24px;
      position:relative;
    }
    .back-link{
      display:inline-flex;align-items:center;gap:6px;
      color:var(--brown-light);text-decoration:none;
      font-size:12px;font-weight:500;letter-spacing:0.5px;
      margin-bottom:16px;
      transition:color 0.2s;
    }
    .back-link:hover{color:#fff}
    .header-top{
      display:flex;align-items:center;justify-content:space-between;
      max-width:700px;margin:0 auto 18px;
      flex-wrap:wrap;gap:12px;
    }
    .header-title-wrap{flex:1;min-width:200px}
    .header-title{
      font-family:'Playfair Display',serif;
      font-size:clamp(24px,5vw,32px);font-weight:700;color:#fff;
    }
    .header-sub{font-size:12px;color:var(--brown-light);margin-top:2px}

    .new-btn{
      background:linear-gradient(135deg,var(--gold),var(--gold-light));
      color:var(--brown-deep);border:none;
      border-radius:99px;padding:12px 22px;
      font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;
      cursor:pointer;white-space:nowrap;
      box-shadow:0 4px 16px rgba(201,148,58,0.3);
      transition:transform 0.2s;
    }
    .new-btn:hover{transform:translateY(-2px)}

    /* progress summary */
    .summary-row{
      max-width:700px;margin:0 auto;
      display:flex;align-items:center;gap:16px;
      flex-wrap:wrap;
    }
    .summary-ring{
      width:48px;height:48px;border-radius:50%;
      background:conic-gradient(var(--gold) calc(var(--pct,0)*1%), rgba(255,255,255,0.15) 0);
      display:flex;align-items:center;justify-content:center;
      position:relative;flex-shrink:0;
    }
    .summary-ring::after{
      content:'';position:absolute;inset:5px;
      border-radius:50%;background:var(--brown-rich);
    }
    .summary-ring span{position:relative;z-index:1;font-size:11px;font-weight:700;color:#fff}
    .summary-text{font-size:12px;color:var(--brown-light)}
    .summary-text strong{color:#fff;font-family:'Playfair Display',serif;font-size:14px}

    /* ── FILTER ROW ── */
    .filter-wrap{
      max-width:700px;margin:0 auto;
      padding:18px 24px 0;
    }
    .filter-row{
      display:flex;gap:8px;overflow-x:auto;
      padding-bottom:4px;
    }
    .filter-pill{
      flex-shrink:0;
      background:#fff;border:1.5px solid var(--brown-light);
      color:var(--text-mid);
      border-radius:99px;padding:8px 16px;
      font-size:12.5px;font-weight:500;cursor:pointer;
      transition:all 0.2s;white-space:nowrap;
    }
    .filter-pill.active{
      background:var(--brown-warm);border-color:var(--brown-warm);color:#fff;
    }

    /* ── TASK LIST ── */
    .tasks-wrap{max-width:700px;margin:0 auto;padding:18px 24px 0}

    .group-label{
      font-size:10.5px;letter-spacing:2.5px;text-transform:uppercase;
      color:var(--text-soft);font-weight:600;
      margin:22px 0 10px;
      display:flex;align-items:center;gap:10px;
    }
    .group-label.overdue{color:var(--red)}
    .group-label::after{content:'';flex:1;height:1px;background:var(--brown-light)}

    .task-card{
      background:#fff;border:1px solid var(--brown-light);
      border-radius:16px;margin-bottom:10px;
      padding:16px 18px;
      transition:box-shadow 0.2s,transform 0.2s;
      cursor:pointer;
    }
    .task-card:hover{box-shadow:0 6px 20px rgba(107,58,31,0.10);transform:translateY(-1px)}
    .task-card.done{opacity:0.6}
    .task-card.done .task-title{text-decoration:line-through;color:var(--text-soft)}
    .task-card.overdue{border-left:3px solid var(--red)}

    .task-top{display:flex;align-items:flex-start;gap:12px}
    .task-check{
      width:22px;height:22px;min-width:22px;border-radius:50%;
      border:2px solid var(--brown-mid);background:#fff;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;margin-top:2px;transition:all 0.2s;
    }
    .task-check.checked{background:var(--green);border-color:var(--green)}
    .task-check svg{display:none}
    .task-check.checked svg{display:block}

    .task-body{flex:1;min-width:0}
    .task-title{font-family:'Playfair Display',serif;font-size:15.5px;font-weight:600;color:var(--text-dark);line-height:1.4}
    .task-note-preview{font-size:12.5px;color:var(--text-soft);margin-top:4px;line-height:1.4;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    .task-meta{display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap}
    .due-badge{
      font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px;
      display:flex;align-items:center;gap:4px;
    }
    .due-overdue{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
    .due-today{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
    .due-future{background:var(--brown-blush);color:var(--text-mid);border:1px solid var(--brown-light)}
    .due-none{background:#F3EDE8;color:var(--text-soft);border:1px solid var(--brown-light)}

    .status-pill{font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px;cursor:pointer}
    .status-todo{background:#F3EDE8;color:var(--brown-warm);border:1px solid var(--brown-light)}
    .status-doing{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
    .status-done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}

    .urgent-tag{
      font-size:11px;font-weight:600;color:var(--red);
      display:flex;align-items:center;gap:3px;
    }

    .task-actions{display:flex;gap:6px;margin-left:auto}
    .icon-btn{
      background:none;border:none;cursor:pointer;
      font-size:15px;color:var(--text-soft);padding:4px;
      transition:color 0.2s;
    }
    .icon-btn:hover{color:var(--brown-warm)}
    .icon-btn.delete:hover{color:var(--red)}

    /* ── EMPTY STATE ── */
    .empty-state{
      text-align:center;padding:60px 24px;
      color:var(--text-soft);
    }
    .empty-state .emoji{font-size:42px;margin-bottom:14px}
    .empty-state h3{font-family:'Playfair Display',serif;color:var(--brown-deep);font-size:18px;margin-bottom:6px}
    .empty-state p{font-size:13px;max-width:280px;margin:0 auto;line-height:1.6}

    /* ── SLIDE-UP PANEL ── */
    .overlay{
      display:none;position:fixed;inset:0;
      background:rgba(62,31,0,0.45);z-index:100;
      backdrop-filter:blur(2px);
    }
    .overlay.show{display:block}

    .panel{
      position:fixed;left:0;right:0;bottom:0;
      background:var(--cream);
      border-radius:24px 24px 0 0;
      max-width:700px;margin:0 auto;
      padding:24px 24px 28px;
      z-index:101;
      transform:translateY(100%);
      transition:transform 0.3s cubic-bezier(.25,.8,.25,1);
      max-height:88vh;overflow-y:auto;
    }
    .panel.show{transform:translateY(0)}

    .panel-handle{
      width:40px;height:4px;background:var(--brown-light);
      border-radius:99px;margin:0 auto 18px;
    }
    .panel-title{
      font-family:'Playfair Display',serif;font-size:20px;font-weight:700;
      color:var(--brown-deep);margin-bottom:18px;
    }

    .field-label{
      font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
      color:var(--text-soft);font-weight:600;margin-bottom:7px;display:block;
    }
    .field{margin-bottom:16px}
    .field input[type="text"],
    .field textarea{
      width:100%;border:1.5px solid var(--brown-light);
      border-radius:12px;padding:12px 14px;
      font-family:'DM Sans',sans-serif;font-size:14px;
      background:#fff;outline:none;transition:border-color 0.2s;
      color:var(--text-dark);
    }
    .field input[type="text"]:focus,
    .field textarea:focus{border-color:var(--brown-warm)}
    .field textarea{resize:vertical;min-height:70px}

    .field-row{display:flex;gap:12px}
    .field-row .field{flex:1}
    .field input[type="date"],
    .field input[type="time"]{
      width:100%;border:1.5px solid var(--brown-light);
      border-radius:12px;padding:11px 12px;
      font-family:'DM Sans',sans-serif;font-size:13.5px;
      background:#fff;outline:none;color:var(--text-dark);
    }

    .toggle-row{display:flex;gap:10px;margin-bottom:16px}
    .toggle-opt{
      flex:1;text-align:center;padding:10px;
      border:1.5px solid var(--brown-light);border-radius:12px;
      font-size:13px;font-weight:500;color:var(--text-mid);
      cursor:pointer;transition:all 0.2s;
    }
    .toggle-opt.active{background:var(--brown-warm);border-color:var(--brown-warm);color:#fff}
    .toggle-opt.urgent-active{background:var(--red);border-color:var(--red);color:#fff}

    .panel-btns{display:flex;gap:10px;margin-top:6px}
    .save-btn{
      flex:1;background:linear-gradient(135deg,var(--brown-rich),var(--brown-warm));
      color:#fff;border:none;border-radius:14px;padding:15px;
      font-size:14.5px;font-weight:600;cursor:pointer;
      font-family:'DM Sans',sans-serif;
    }
    .cancel-btn{
      background:#fff;border:1.5px solid var(--brown-light);
      color:var(--text-mid);border-radius:14px;padding:15px 22px;
      font-size:14.5px;font-weight:500;cursor:pointer;
      font-family:'DM Sans',sans-serif;
    }

    @media(max-width:480px){
      .header{padding:22px 16px 20px}
      .tasks-wrap{padding:16px 16px 0}
      .filter-wrap{padding:16px 16px 0}
      .panel{padding:22px 18px 24px}
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="../" class="back-link">← Back to Hub</a>
    <div class="header-top">
      <div class="header-title-wrap">
        <div class="header-title">Virtue's Tasks ✅</div>
        <div class="header-sub">Whatever needs doing, it lives here.</div>
      </div>
      <button class="new-btn" id="new-task-btn">+ New Task</button>
    </div>
    <div class="summary-row">
      <div class="summary-ring" id="summary-ring" style="--pct:0"><span id="summary-pct">0%</span></div>
      <div class="summary-text"><strong id="summary-count">0 of 0</strong><br/>tasks completed</div>
    </div>
  </div>

  <div class="filter-wrap">
    <div class="filter-row">
      <button class="filter-pill active" data-filter="all">All</button>
      <button class="filter-pill" data-filter="todo">To Do</button>
      <button class="filter-pill" data-filter="doing">In Progress</button>
      <button class="filter-pill" data-filter="done">Done</button>
    </div>
  </div>

  <div class="tasks-wrap" id="tasks-container"></div>

  <!-- ── PANEL ── -->
  <div class="overlay" id="overlay"></div>
  <div class="panel" id="panel">
    <div class="panel-handle"></div>
    <div class="panel-title" id="panel-title">New Task</div>

    <div class="field">
      <label class="field-label">Task</label>
      <input type="text" id="f-title" placeholder="What needs to get done?"/>
    </div>

    <div class="field-row">
      <div class="field">
        <label class="field-label">Due Date</label>
        <input type="date" id="f-date"/>
      </div>
      <div class="field">
        <label class="field-label">Time</label>
        <input type="time" id="f-time"/>
      </div>
    </div>

    <div class="field">
      <label class="field-label">Priority</label>
      <div class="toggle-row">
        <div class="toggle-opt active" data-priority="normal">Normal</div>
        <div class="toggle-opt" data-priority="urgent">Urgent</div>
      </div>
    </div>

    <div class="field">
      <label class="field-label">Notes</label>
      <textarea id="f-notes" placeholder="Any details, context, or reminders…"></textarea>
    </div>

    <div class="panel-btns">
      <button class="cancel-btn" id="cancel-btn">Cancel</button>
      <button class="save-btn" id="save-btn">Save Task</button>
    </div>
  </div>

<script>
const STORAGE_KEY='virtue_tasks_manager_v1';
let tasks=[];
let editingId=null;
let currentFilter='all';
let selectedPriority='normal';

function loadTasks(){
  try{tasks=JSON.parse(localStorage.getItem(STORAGE_KEY))||[]}catch{tasks=[]}
}
function saveTasks(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(tasks));
}

function uid(){return 't_'+Date.now()+'_'+Math.floor(Math.random()*10000)}

function todayStr(){
  const d=new Date();
  return d.toISOString().split('T')[0];
}

function getDueInfo(task){
  if(!task.date)return{label:'No due date',cls:'due-none',overdue:false,today:false};
  const today=todayStr();
  const taskDate=task.date;
  if(taskDate<today && task.status!=='done')return{label:formatDate(task)+' (Overdue)',cls:'due-overdue',overdue:true,today:false};
  if(taskDate===today)return{label:'Today'+(task.time?' '+formatTime(task.time):''),cls:'due-today',overdue:false,today:true};
  return{label:formatDate(task)+(task.time?' '+formatTime(task.time):''),cls:'due-future',overdue:false,today:false};
}

function formatDate(task){
  const d=new Date(task.date+'T00:00:00');
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}
function formatTime(t){
  const[h,m]=t.split(':');
  const hh=parseInt(h);
  const period=hh>=12?'PM':'AM';
  const h12=hh%12===0?12:hh%12;
  return `${h12}:${m} ${period}`;
}

function sortTasks(list){
  return [...list].sort((a,b)=>{
    // done tasks go last
    if((a.status==='done')!==(b.status==='done'))return a.status==='done'?1:-1;
    const aInfo=getDueInfo(a),bInfo=getDueInfo(b);
    // overdue first
    if(aInfo.overdue!==bInfo.overdue)return aInfo.overdue?-1:1;
    // urgent next
    if(a.priority!==b.priority)return a.priority==='urgent'?-1:1;
    // then by date
    const aDate=a.date||'9999-99-99';
    const bDate=b.date||'9999-99-99';
    if(aDate!==bDate)return aDate<bDate?-1:1;
    const aTime=a.time||'99:99';
    const bTime=b.time||'99:99';
    return aTime<bTime?-1:1;
  });
}

function render(){
  const container=document.getElementById('tasks-container');
  let filtered=tasks;
  if(currentFilter!=='all')filtered=tasks.filter(t=>t.status===currentFilter);

  const sorted=sortTasks(filtered);

  if(sorted.length===0){
    container.innerHTML=`
      <div class="empty-state">
        <div class="emoji">🌸</div>
        <h3>${currentFilter==='all'?'No tasks yet':'Nothing here'}</h3>
        <p>${currentFilter==='all'?'Tap "+ New Task" to add your first one.':'Try a different filter, or add a new task.'}</p>
      </div>`;
    updateSummary();
    return;
  }

  // group by overdue / today / upcoming / done
  const overdue=sorted.filter(t=>getDueInfo(t).overdue && t.status!=='done');
  const today=sorted.filter(t=>getDueInfo(t).today && !getDueInfo(t).overdue && t.status!=='done');
  const upcoming=sorted.filter(t=>{
    const info=getDueInfo(t);
    return !info.overdue && !info.today && t.status!=='done';
  });
  const done=sorted.filter(t=>t.status==='done');

  let html='';
  if(overdue.length)html+=`<div class="group-label overdue">⚠ Overdue</div>${overdue.map(taskHTML).join('')}`;
  if(today.length)html+=`<div class="group-label">Today</div>${today.map(taskHTML).join('')}`;
  if(upcoming.length)html+=`<div class="group-label">Upcoming</div>${upcoming.map(taskHTML).join('')}`;
  if(done.length)html+=`<div class="group-label">Completed</div>${done.map(taskHTML).join('')}`;

  container.innerHTML=html;
  attachCardEvents();
  updateSummary();
}

function taskHTML(t){
  const info=getDueInfo(t);
  const statusLabel=t.status==='todo'?'To Do':t.status==='doing'?'In Progress':'Done ✓';
  const checked=t.status==='done';
  return `
    <div class="task-card ${checked?'done':''} ${info.overdue?'overdue':''}" data-id="${t.id}">
      <div class="task-top">
        <div class="task-check ${checked?'checked':''}" data-action="toggle" data-id="${t.id}">
          <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
            <path d="M1 4L4 7.5L10 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="task-body" data-action="edit" data-id="${t.id}">
          <div class="task-title">${escapeHtml(t.title)}</div>
          ${t.notes?`<div class="task-note-preview">${escapeHtml(t.notes)}</div>`:''}
          <div class="task-meta">
            <span class="due-badge ${info.cls}">${info.label}</span>
            <span class="status-pill status-${t.status}" data-action="cycle" data-id="${t.id}">${statusLabel}</span>
            ${t.priority==='urgent'?'<span class="urgent-tag">⚡ Urgent</span>':''}
          </div>
        </div>
        <div class="task-actions">
          <button class="icon-btn delete" data-action="delete" data-id="${t.id}" title="Delete">✕</button>
        </div>
      </div>
    </div>
  `;
}

function escapeHtml(str){
  const div=document.createElement('div');
  div.textContent=str;
  return div.innerHTML;
}

function attachCardEvents(){
  document.querySelectorAll('[data-action="toggle"]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const id=el.dataset.id;
      const t=tasks.find(x=>x.id===id);
      t.status=t.status==='done'?'todo':'done';
      saveTasks();render();
    });
  });
  document.querySelectorAll('[data-action="cycle"]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const id=el.dataset.id;
      const t=tasks.find(x=>x.id===id);
      const cycle=['todo','doing','done'];
      t.status=cycle[(cycle.indexOf(t.status)+1)%cycle.length];
      saveTasks();render();
    });
  });
  document.querySelectorAll('[data-action="delete"]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const id=el.dataset.id;
      tasks=tasks.filter(x=>x.id!==id);
      saveTasks();render();
    });
  });
  document.querySelectorAll('[data-action="edit"]').forEach(el=>{
    el.addEventListener('click',()=>{
      openPanel(el.dataset.id);
    });
  });
}

function updateSummary(){
  const total=tasks.length;
  const done=tasks.filter(t=>t.status==='done').length;
  const pct=total?Math.round((done/total)*100):0;
  document.getElementById('summary-ring').style.setProperty('--pct',pct);
  document.getElementById('summary-pct').textContent=pct+'%';
  document.getElementById('summary-count').textContent=`${done} of ${total}`;
}

/* ── PANEL ── */
function openPanel(id=null){
  editingId=id;
  const overlay=document.getElementById('overlay');
  const panel=document.getElementById('panel');

  if(id){
    const t=tasks.find(x=>x.id===id);
    document.getElementById('panel-title').textContent='Edit Task';
    document.getElementById('f-title').value=t.title;
    document.getElementById('f-date').value=t.date||'';
    document.getElementById('f-time').value=t.time||'';
    document.getElementById('f-notes').value=t.notes||'';
    selectedPriority=t.priority||'normal';
  }else{
    document.getElementById('panel-title').textContent='New Task';
    document.getElementById('f-title').value='';
    document.getElementById('f-date').value='';
    document.getElementById('f-time').value='';
    document.getElementById('f-notes').value='';
    selectedPriority='normal';
  }
  updatePriorityToggle();

  overlay.classList.add('show');
  panel.classList.add('show');
  setTimeout(()=>document.getElementById('f-title').focus(),300);
}

function closePanel(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('panel').classList.remove('show');
  editingId=null;
}

function updatePriorityToggle(){
  document.querySelectorAll('.toggle-opt').forEach(el=>{
    el.classList.remove('active','urgent-active');
    if(el.dataset.priority===selectedPriority){
      el.classList.add(selectedPriority==='urgent'?'urgent-active':'active');
    }
  });
}

document.querySelectorAll('.toggle-opt').forEach(el=>{
  el.addEventListener('click',()=>{
    selectedPriority=el.dataset.priority;
    updatePriorityToggle();
  });
});

document.getElementById('new-task-btn').addEventListener('click',()=>openPanel());
document.getElementById('cancel-btn').addEventListener('click',closePanel);
document.getElementById('overlay').addEventListener('click',closePanel);

document.getElementById('save-btn').addEventListener('click',()=>{
  const title=document.getElementById('f-title').value.trim();
  if(!title){
    document.getElementById('f-title').focus();
    return;
  }
  const date=document.getElementById('f-date').value;
  const time=document.getElementById('f-time').value;
  const notes=document.getElementById('f-notes').value.trim();

  if(editingId){
    const t=tasks.find(x=>x.id===editingId);
    t.title=title;t.date=date;t.time=time;t.notes=notes;t.priority=selectedPriority;
  }else{
    tasks.push({
      id:uid(),title,date,time,notes,
      priority:selectedPriority,status:'todo',
      createdAt:Date.now()
    });
  }
  saveTasks();
  closePanel();
  render();
});

/* ── FILTERS ── */
document.querySelectorAll('.filter-pill').forEach(el=>{
  el.addEventListener('click',()=>{
    document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
    el.classList.add('active');
    currentFilter=el.dataset.filter;
    render();
  });
});

/* ── INIT ── */
loadTasks();
render();
</script>
</body>
</html>
